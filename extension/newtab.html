<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetCode Dashboard</title>
  <link rel="stylesheet" href="newtab.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="username">aarchit1999</span>
      <span class="divider">/</span>
      <span class="site">leetcode</span>
    </div>

    <div id="loading" class="loading">fetching stats...</div>
    <div id="error" class="error hidden"></div>

    <div id="content" class="hidden">

      <!-- Gauge + difficulty boxes -->
      <div class="gauge-section">
        <div class="gauge-wrap">
          <svg id="gauge-svg" viewBox="0 0 200 200" width="200" height="200"></svg>
          <div class="gauge-center">
            <div class="gauge-number">
              <span id="gauge-solved">—</span><span class="gauge-slash">/</span><span id="gauge-total" class="gauge-total-num">—</span>
            </div>
            <div class="gauge-sublabel">&#10003; Solved</div>
          </div>
        </div>

        <div class="diff-boxes">
          <div class="diff-box">
            <span class="diff-name easy">Easy</span>
            <span class="diff-count" id="easy-count">—</span>
          </div>
          <div class="diff-box">
            <span class="diff-name medium">Med.</span>
            <span class="diff-count" id="medium-count">—</span>
          </div>
          <div class="diff-box">
            <span class="diff-name hard">Hard</span>
            <span class="diff-count" id="hard-count">—</span>
          </div>
        </div>
      </div>

      <!-- Heatmap -->
      <div class="heatmap-section">
        <div class="heatmap-header">
          <span id="submission-count">— submissions in the past year</span>
          <span class="heatmap-meta">Active: <strong id="active">—</strong> &nbsp;·&nbsp; Streak: <strong id="streak">—</strong></span>
        </div>
        <div class="heatmap-grid" id="heatmap"></div>
        <div class="heatmap-legend">
          <span>less</span>
          <div class="legend-cell l0"></div>
          <div class="legend-cell l1"></div>
          <div class="legend-cell l2"></div>
          <div class="legend-cell l3"></div>
          <div class="legend-cell l4"></div>
          <span>more</span>
        </div>
      </div>

    </div>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
